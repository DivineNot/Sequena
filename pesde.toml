name = "divinenot/sequena"
version = "0.1.1"
description = "A Roblox Networking Module."
authors = ["DivineNot"]
repository = "https://github.com/DivineNot/Sequena"
license = "MIT"
includes = [
    "pesde.toml",
    "wally.toml",
    "README.md",
    "src/**/*.luau"
]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]
[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
